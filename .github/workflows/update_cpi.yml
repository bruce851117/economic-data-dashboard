name: Update BLS Economic Data

on: workflow_dispatch

permissions:
  contents: write

concurrency:
  group: update-bls-economic-data
  cancel-in-progress: false

jobs:
  update-economic-data:
    name: Fetch and update BLS economic data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Confirm BLS API key
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          if [ -z "$BLS_API_KEY" ]; then
            echo "ERROR: GitHub Secret BLS_API_KEY is missing."
            exit 1
          fi

          echo "BLS_API_KEY is configured."
          echo "Key length: ${#BLS_API_KEY}"

      - name: Fetch CPI data
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          python scripts/fetch_cpi.py

      - name: Validate CPI JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/cpi.json")

          if not path.exists():
              raise SystemExit(
                  "ERROR: data/cpi.json was not created."
              )

          with path.open("r", encoding="utf-8") as file:
              payload = json.load(file)

          periods = payload.get("periods", [])
          rows = payload.get("rows", [])

          period_count = payload.get(
              "period_count",
              0,
          )

          row_count = payload.get(
              "row_count",
              0,
          )

          if len(periods) != 12:
              raise SystemExit(
                  "ERROR: CPI JSON must contain "
                  f"12 periods, but found {len(periods)}."
              )

          if len(rows) != 32:
              raise SystemExit(
                  "ERROR: CPI JSON must contain "
                  f"32 rows, but found {len(rows)}."
              )

          if period_count != len(periods):
              raise SystemExit(
                  "ERROR: period_count does not "
                  "match periods length."
              )

          if row_count != len(rows):
              raise SystemExit(
                  "ERROR: row_count does not "
                  "match rows length."
              )

          available_names = {
              row.get("name")
              for row in rows
          }

          required_names = {
              "All Items",
              "Food",
              "Energy",
              "All Items Less Food and Energy",
              "Household Furnishings and Supplies",
              "Transportation Commodities Less Motor Fuel",
              "Education and Communication Commodities",
              "Alcoholic Beverages",
              "Other Goods",
              "Water, Sewer and Trash Collection Services",
              "Car and Truck Rental",
              "Recreation Services",
              "Education and Communication Services",
          }

          missing_names = (
              required_names - available_names
          )

          if missing_names:
              raise SystemExit(
                  "ERROR: Required CPI rows missing: "
                  + ", ".join(sorted(missing_names))
              )

          if "Health Insurance" in available_names:
              raise SystemExit(
                  "ERROR: Health Insurance should "
                  "not be included in CPI JSON."
              )

          expected_series = {
              "Household Furnishings and Supplies":
                  "CUSR0000SAH31",
              "Transportation Commodities Less Motor Fuel":
                  "CUSR0000SATCLTB",
              "Education and Communication Commodities":
                  "CUSR0000SAEC",
              "Alcoholic Beverages":
                  "CUSR0000SAF116",
              "Other Goods":
                  "CUSR0000SAGC",
              "Water, Sewer and Trash Collection Services":
                  "CUSR0000SEHG",
              "Car and Truck Rental":
                  "CUSR0000SETA04",
              "Recreation Services":
                  "CUSR0000SARS",
              "Education and Communication Services":
                  "CUSR0000SAES",
          }

          rows_by_name = {
              row.get("name"): row
              for row in rows
          }

          for name, expected_id in expected_series.items():
              actual_id = rows_by_name[name].get(
                  "bls_series_id"
              )

              if actual_id != expected_id:
                  raise SystemExit(
                      "ERROR: Incorrect BLS series ID "
                      f"for {name}: {actual_id}"
                  )

          for row in rows:
              values = row.get("values", [])

              if len(values) != len(periods):
                  raise SystemExit(
                      "ERROR: CPI row has incorrect "
                      f"value count: {row.get('name')}"
                  )

          print("CPI JSON validation passed.")
          print(f"Periods: {len(periods)}")
          print(f"Rows: {len(rows)}")
          print(
              "Range:",
              periods[0].get("period"),
              "to",
              periods[-1].get("period"),
          )
          print(
              "Unavailable series:",
              payload.get(
                  "missing_series_count",
                  0,
              ),
          )
          PY

      - name: Commit updated CPI data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/cpi.json

          if git diff --cached --quiet; then
            echo "CPI data has not changed."
            echo "No commit is required."
            exit 0
          fi

          git commit -m "Update BLS CPI data"
          git push