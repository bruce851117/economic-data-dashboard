name: Update BLS CPI Data

on:
  # 允許從 GitHub Actions 頁面手動執行
  workflow_dispatch:

  # 每天台灣時間 20:30 自動檢查一次
  # UTC 12:30 = 台灣時間 20:30
  schedule:
    - cron: "30 12 * * *"

permissions:
  contents: write

concurrency:
  group: update-bls-cpi-data
  cancel-in-progress: false

jobs:
  update-cpi:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Create requirements file if missing
        run: |
          if [ ! -f requirements.txt ]; then
            cat > requirements.txt <<'EOF'
          beautifulsoup4
          lxml
          pandas
          requests
          EOF
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch BLS CPI data
        run: |
          python scripts/fetch_cpi.py

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/cpi_table2.json")

          if not path.exists():
              raise SystemExit("data/cpi_table2.json was not created.")

          with path.open("r", encoding="utf-8") as file:
              payload = json.load(file)

          row_count = payload.get("row_count", 0)
          data = payload.get("data", [])

          if row_count <= 0:
              raise SystemExit("The generated JSON contains no rows.")

          if not data:
              raise SystemExit("The generated JSON data array is empty.")

          print(f"JSON validation passed: {row_count} rows")
          print(f"Reference period: {payload.get('reference_period', '')}")
          PY

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/cpi_table2.json requirements.txt

          if git diff --cached --quiet; then
            echo "No CPI data changes detected."
            exit 0
          fi

          git commit -m "Update BLS CPI data"
          git push
