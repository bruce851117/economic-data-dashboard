name: Update BLS CPI Data

on: workflow_dispatch

permissions:
  contents: write

concurrency:
  group: update-bls-cpi-data
  cancel-in-progress: false

jobs:
  update-cpi:
    name: Fetch and update CPI data
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Fetch CPI data from BLS Public Data API
        run: |
          python scripts/fetch_cpi.py

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/cpi_table2.json")

          if not path.exists():
              raise SystemExit(
                  "ERROR: data/cpi_table2.json was not created."
              )

          with path.open("r", encoding="utf-8") as file:
              payload = json.load(file)

          rows = payload.get("data", [])
          row_count = payload.get("row_count", 0)

          if not rows:
              raise SystemExit(
                  "ERROR: CPI data is empty."
              )

          if row_count != len(rows):
              raise SystemExit(
                  "ERROR: row_count does not match data length."
              )

          required_names = {
              "All items",
              "All items less food and energy",
              "Food",
              "Energy",
          }

          available_names = {
              row.get("name_en")
              for row in rows
          }

          missing_names = (
              required_names - available_names
          )

          if missing_names:
              raise SystemExit(
                  "ERROR: Missing CPI categories: "
                  + ", ".join(sorted(missing_names))
              )

          print("JSON validation passed.")
          print(f"Rows: {row_count}")
          print(
              "Reference period:",
              payload.get("reference_period", ""),
          )
          PY

      - name: Commit updated CPI data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/cpi_table2.json

          if git diff --cached --quiet; then
            echo "CPI data has not changed."
            echo "No commit is required."
            exit 0
          fi

          git commit -m "Update BLS CPI data"
          git push
