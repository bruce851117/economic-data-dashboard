name: Update BLS CPI Data

on:
  # 只允許手動觸發，不設定任何自動排程
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bls-cpi-data
  cancel-in-progress: false

jobs:
  update-cpi:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml pandas requests

      - name: Fetch BLS CPI data
        run: |
          python scripts/fetch_cpi.py

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/cpi_table2.json")

          if not path.exists():
              raise SystemExit(
                  "ERROR: data/cpi_table2.json was not created."
              )

          with path.open("r", encoding="utf-8") as file:
              payload = json.load(file)

          row_count = payload.get("row_count", 0)
          data = payload.get("data", [])
          columns = payload.get("columns", [])

          if row_count <= 0:
              raise SystemExit(
                  "ERROR: The generated JSON contains no rows."
              )

          if not data:
              raise SystemExit(
                  "ERROR: The generated JSON data array is empty."
              )

          if not columns:
              raise SystemExit(
                  "ERROR: The generated JSON contains no columns."
              )

          if row_count != len(data):
              raise SystemExit(
                  "ERROR: row_count does not match data length."
              )

          print("JSON validation passed.")
          print(f"Rows: {row_count}")
          print(f"Columns: {len(columns)}")
          print(
              "Reference period:",
              payload.get("reference_period", "")
          )
          PY

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/cpi_table2.json

          if git diff --cached --quiet; then
            echo "No CPI data changes detected."
            exit 0
          fi

          git commit -m "Update BLS CPI data"
          git push
