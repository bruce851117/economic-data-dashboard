name: Update BLS Economic Data

on: workflow_dispatch

permissions:
  contents: write

concurrency:
  group: update-bls-economic-data
  cancel-in-progress: false

jobs:
  update-economic-data:
    name: Fetch and update BLS economic data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Confirm BLS API key
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          if [ -z "$BLS_API_KEY" ]; then
            echo "ERROR: GitHub Secret BLS_API_KEY is missing."
            exit 1
          fi

          echo "BLS_API_KEY is configured."
          echo "Key length: ${#BLS_API_KEY}"

      - name: Fetch CPI data from BLS API
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          python scripts/fetch_cpi.py

      - name: Validate CPI JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/cpi_table2.json")

          if not path.exists():
              raise SystemExit(
                  "ERROR: data/cpi_table2.json was not created."
              )

          with path.open("r", encoding="utf-8") as file:
              payload = json.load(file)

          rows = payload.get("data", [])
          row_count = payload.get("row_count", 0)

          if not rows:
              raise SystemExit(
                  "ERROR: CPI data is empty."
              )

          if row_count != len(rows):
              raise SystemExit(
                  "ERROR: row_count does not match data length."
              )

          print("CPI JSON validation passed.")
          print(f"Rows: {row_count}")
          print(
              "Reference period:",
              payload.get("reference_period", ""),
          )
          PY

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "BLS economic data has not changed."
            echo "No commit is required."
            exit 0
          fi

          git commit -m "Update BLS economic data"
          git push
