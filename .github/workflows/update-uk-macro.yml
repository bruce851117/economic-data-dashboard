name: Update UK Macro Data
on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1-5"
permissions:
  contents: write
concurrency:
  group: update-uk-macro-data
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check requests beautifulsoup4 pypdf
      - name: Update all available UK data
        run: python scripts/update_uk_macro.py
      - name: Commit changes
        run: |
          if git diff --quiet -- data/uk_macro.json; then
            echo "No new or revised UK data."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/uk_macro.json
          git commit -m "Update UK macro data"
          git push
