name: Update UK Macro Data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 8 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-uk-macro-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update UK macro data
        run: python scripts/update_uk_macro.py

      - name: Commit only when data changed
        run: |
          if git diff --quiet -- data/uk_macro.json; then
            echo "No new or revised UK macro data."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/uk_macro.json
          git commit -m "Update UK macro data"
          git push
