name: Validate UK Macro Sources

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate UK macro sources
        run: python validate_uk_macro_sources.py

      - name: Upload validation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uk-macro-validation-${{ github.run_number }}
          path: uk_validation_output/
          if-no-files-found: warn
          retention-days: 14
