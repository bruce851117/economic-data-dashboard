name: Validate UK Macro Sources V4
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pypdf
      - run: python validate_uk_macro_sources.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uk-macro-validation-v4-${{ github.run_number }}
          path: uk_validation_output/
          if-no-files-found: warn
          retention-days: 14
